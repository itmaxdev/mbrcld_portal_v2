<div class="sideBox">
    <div class="inlineCalenderSmallCard">
        <div class="inner">
            <div class="inlineCalenderSmall" #inlineCalenderSmall id="inlineCalenderSmall"></div>
        </div>
    </div>
    <div class="leadersHighlightCard">
        <div class="imgBox" *ngIf="videoUrl">
                <iframe [src]="videoUrl" width="100%" height="188" i18n>
                    Video not found
                  </iframe>
            <!-- <picture class="" *ngIf="!videoUrl">
                <source srcset="./assets/images/leadersHighlightImg.jpg" type="image/jpeg" />
                <img src="./assets/images/leadersHighlightImg.jpg" alt="" width="314" height="188" loading="lazy" />
            </picture> -->
        </div>
        <div class="contentBox">
            <div class="title" i18n>{{currentLang == 'en' ? 'Leaders Highlights' : 'معلومات المركز'}}</div>

            <div class="points">
                <div class="p" *ngFor="let item of listItems">
                    <div class="num" dir="ltr" [attr.data-animcount]="item.number">
                        <i class="not-italic">{{item.number}}</i><sup>+</sup>
                    </div>
                    <span i18n>{{item.title}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
