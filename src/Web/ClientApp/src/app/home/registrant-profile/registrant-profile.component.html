 <div class="mainContainer">
          <div class="gridWrap">
            <div class="generalCard">
              <div class="inner">
                <div class="cardTitleWrap">
                  <div class="cardTitle">My Profile</div>
                  <div class="cardTools">
                    <div class="progressWrap">
                      <div class="pInfo">
                        <span *ngIf="progressReady">{{ completionPercentage }}% Profile Completed </span>
                      </div>
                      <!-- color options available : [green , blue , red ]  -->
                      <div class="progress">
                        <div
                          class="progress-fill"
                          data-color="blue"
                          [ngStyle]="{ 'width': completionPercentage + '%' }"
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="normalTab">
                  <a routerLink="general-information" routerLinkActive="active" class="tabLink">
                    <span>General Information</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="identity"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Identity</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="experience"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Experience</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="education"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Education</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="training-courses"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Training Courses</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="achievements"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Achievements</span>
                  </a>
                  <a
                    *ngIf="role !== 4"
                    routerLink="preferences"
                    routerLinkActive="active"
                    class="tabLink"
                  >
                    <span>Preferences</span>
                  </a>
                  <a *ngIf="role !== 4" routerLink="skills" routerLinkActive="active" class="tabLink">
                    <span>Skills</span>
                  </a>
                  <a *ngIf="role !== 3 && role !== 1" routerLink="module-team" routerLinkActive="active" class="tabLink">
                    <span>Module Team</span>
                  </a>
                </div>
                
                <router-outlet></router-outlet>

              </div>
            </div>
          </div>
<app-side-box></app-side-box>
         
        </div>
