<ng-template #loading>
  <div class="flex flex-grow justify-center items-center py-8">
    <p-progressSpinner></p-progressSpinner>
  </div>
</ng-template>

<ng-container *ngIf="ready; else loading">
  <div class="form-v3 filledColor formBlock">
    <div class="formGroup">
      <div class="buttonGroup end">
        <a (click)="openAddMember()" class="more wAuto sm">
          <span>Add Member</span>
        </a>
      </div>

      <div class="memberList">
        <div class="memberCard" *ngFor="let item of members">
          <div class="inner">
            <div class="imgBox">
              <picture>
                <img
                  [src]="item.pictureUrl || './assets/images/avImg.jpg'"
                  [alt]="item.firstName + ' ' + item.lastName"
                  width="200"
                  height="200"
                  loading="lazy"
                />
              </picture>
            </div>

            <div class="contentBox">
              <div class="name">{{ item.name }}</div>

              <div class="dec">
                {{ item.jobPosition }}
              </div>

              <div class="textBox sm">
                <p style="display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                  {{ item.aboutMember }}
                </p>
              </div>

              <div class="socialBox">
                <!-- Email -->
                <a *ngIf="item.email" [href]="'mailto:' + item.email" class="link">
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z"
                      stroke="currentcolor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M22 6L12 13L2 6"
                      stroke="currentcolor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </a>

                <!-- LinkedIn -->
                <a *ngIf="item.linkedIn" [href]="item.linkedIn" target="_blank" class="link">
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M16 8C17.5913 8 19.1174 8.63214 20.2426 9.75736C21.3679 10.8826 22 12.4087 22 14V21H18V14C18 13.4696 17.7893 12.9609 17.4142 12.5858C17.0391 12.2107 16.5304 12 16 12C15.4696 12 14.9609 12.2107 14.5858 12.5858C14.2107 12.9609 14 13.4696 14 14V21H10V14C10 12.4087 10.6321 10.8826 11.7574 9.75736C12.8826 8.63214 14.4087 8 16 8Z"
                      stroke="currentcolor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M6 9H2V21H6V9Z"
                      stroke="currentcolor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M4 6C5.10457 6 6 5.10457 6 4C6 2.89543 5.10457 2 4 2C2.89543 2 2 2.89543 2 4C2 5.10457 2.89543 6 4 6Z"
                      stroke="currentcolor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </a>
              </div>

              <!-- Tools for Edit/Delete -->
              <div class="tools pt-2 flex gap-2">
                <button
                  type="button"
                  class="iconBtn btnGreen"
                  (click)="teamMember(item.id)"
                  title="Edit"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 20H21" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16.5 3.5C16.8978 3.10219 17.4374 2.87869 18 2.87869C18.2786 2.87869 18.5544 2.93356 18.8118 3.04017C19.0692 3.14677 19.303 3.30303 19.5 3.5C19.697 3.697 19.8532 3.93085 19.9598 4.18822C20.0665 4.44559 20.1213 4.72144 20.1213 5C20.1213 5.27859 20.0665 5.55444 19.9598 5.81181C19.8532 6.06918 19.697 6.30303 19.5 6.5L7 19L3 20L4 16L16.5 3.5Z" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button
                  type="button"
                  class="iconBtn btnRed"
                  (click)="deleteItem(item.id)"
                  title="Delete"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 6H21" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M19 6V20C19 21 18 22 17 22H7C6 22 5 21 5 20V6" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 6V4C8 3 9 2 10 2H14C15 2 16 3 16 4V6" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<p-dialog
  [(visible)]="showMemberPopup"
  [modal]="true"
  [showHeader]="false"
  [focusTrap]="false"
  [dismissableMask]="true"
  styleClass="custom-popup-box"
  appendTo="body"
  [contentStyle]="{
    'padding': '0',
    'max-height': '90vh',
    'overflow-y': 'auto',
    'background': 'transparent',
    'border': 'none'
  }"
>
  <div class="popupBox mdBox no-shadow no-margin" id="formPop1" style="display: block;">
    <div class="inner">
      <div class="topBox">
        <div class="title" i18n>{{ editMember ? 'Edit Member' : 'Add Member' }}</div>
        <a href="javascript:void(0)" class="plusBtn" (click)="showMemberPopup = false">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M18 6L6 18"
              stroke="currentcolor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M6 6L18 18"
              stroke="currentcolor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
      </div>
      <div class="formBox">
        <form class="form-v3 filledColor noPad" [formGroup]="teamForm" (ngSubmit)="onSubmit()">
          <div class="inputBox">
            <div class="input-field normal">
              <label for="firstName" i18n>First Name <span class="text-red-500">*</span></label>
              <input id="firstName" type="text" formControlName="firstName" />
              <small appControlValidationError controlName="firstName" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="lastName" i18n>Last Name <span class="text-red-500">*</span></label>
              <input id="lastName" type="text" formControlName="lastName" />
              <small appControlValidationError controlName="lastName" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="jobPosition" i18n>Job Position <span class="text-red-500">*</span></label>
              <input id="jobPosition" type="text" formControlName="jobPosition" />
              <small appControlValidationError controlName="jobPosition" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="education" i18n>Education <span class="text-red-500">*</span></label>
              <input id="education" type="text" formControlName="education" />
              <small appControlValidationError controlName="education" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="emailId" i18n>Email Id <span class="text-red-500">*</span></label>
              <input id="emailId" type="email" formControlName="email" />
              <small appControlValidationError controlName="email" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="linkedIn" i18n>LinkedIn Profile URL <span class="text-red-500">*</span></label>
              <input id="linkedIn" type="text" formControlName="linkedIn" />
              <small appControlValidationError controlName="linkedIn" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="residenceCountry" i18n>Residence country <span class="text-red-500">*</span></label>
              <app-nationality-dropdown
                controlName="residenceCountry"
                appendTo="body"
                placeholder="Select Country"
              ></app-nationality-dropdown>
              <small appControlValidationError controlName="residenceCountry" class="p-invalid"></small>
            </div>
            <div class="input-field normal">
              <label for="nationality" i18n>nationality <span class="text-red-500">*</span></label>
              <app-nationality-dropdown
                controlName="nationality"
                appendTo="body"
                placeholder="Select Nationality"
              ></app-nationality-dropdown>
              <small appControlValidationError controlName="nationality" class="p-invalid"></small>
            </div>
            <div class="input-field normal full">
              <label for="addImage" i18n>Add Image <span *ngIf="!editMember" class="text-red-500">*</span></label>
              <p-fileUpload
                (onSelect)="onSelect($event)"
                accept="image/*"
                [showUploadButton]="false"
                [showCancelButton]="false"
              >
              </p-fileUpload>
              <div class="iconBox">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M21.4403 11.05L12.2503 20.24C11.1244 21.3658 9.59747 21.9983 8.00529 21.9983C6.41311 21.9983 4.88613 21.3658 3.76029 20.24C2.63445 19.1142 2.00195 17.5872 2.00195 15.995C2.00195 14.4028 2.63445 12.8758 3.76029 11.75L12.9503 2.56C13.7009 1.80944 14.7188 1.38778 15.7803 1.38778C16.8417 1.38778 17.8597 1.80944 18.6103 2.56C19.3609 3.31057 19.7825 4.32855 19.7825 5.39C19.7825 6.45146 19.3609 7.46944 18.6103 8.22L9.41029 17.41C9.03501 17.7853 8.52602 17.9961 7.99529 17.9961C7.46456 17.9961 6.95557 17.7853 6.58029 17.41C6.20501 17.0347 5.99418 16.5257 5.99418 15.995C5.99418 15.4643 6.20501 14.9553 6.58029 14.58L15.0703 6.1"
                    stroke="currentcolor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
            </div>
            <div class="input-field normal full">
              <label for="aboutMember" i18n>About Member</label>
              <textarea class="materialize-textarea" id="aboutMember" formControlName="aboutMember"></textarea>
            </div>
            <div class="input-field normal full buttonWrap">
              <button type="submit" class="more wAuto" [disabled]="teamForm.invalid || (!editMember && !uploadedFile)">
                <span i18n>Save Member</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</p-dialog>
